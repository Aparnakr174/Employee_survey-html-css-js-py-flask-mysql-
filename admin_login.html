<!DOCTYPE html>
<html>

<head>

    <title>Admin Login</title>

    <style>

        body{
            text-align:center;
            background-color:#F0FDF4;

            height:100vh;

            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;

            margin:0;

            font-family:Arial;
        }

        .formAligning{
            text-align:center;
        }

        h1{
            color:darkblue;
            margin-bottom:25px;
        }

        form{
            background:white;
            padding:25px;
            border-radius:10px;
            width:350px;
            text-align:center;
            box-shadow:0px 4px 15px rgba(0,0,0,0.3);
        }

        h2{
            margin-bottom:20px;
            color:#333;
        }

        label{
            font-size:18px;
            width:110px;
            text-align:left;
          
        }

        input{
            width:230px;
            padding:8px;
            font-size:15px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        .form-row{
            display:flex;
            align-items:center;
            justify-content:space-between;
            margin-bottom:15px;
        }

        button{
            background-color:#4A90E2;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:5px;
            font-size:15px;
            cursor:pointer;
            transition:background 0.2s;
        }

        button:hover{
            background-color:#357ABD;
        }

        .error-message{
            color:red;
            font-weight:bold;
            margin-bottom:15px;
        }

    </style>

</head>

<body>

    <div class="formAligning">

        <h1>Admin Login</h1>

        <form action="/admin_login" method="POST">

            <h2>Login</h2>

            {% if message %}

            <p class="error-message">

                {{ message }}

            </p>

            {% endif %}

            <div class="form-row">

                <label>Username:</label>

                <input
                    type="text"
                    name="username"
                    placeholder="Enter admin"
                    required
                >

            </div>

            <div class="form-row">

                <label>Password:</label>

                <input
                    type="password"
                    name="password"
                    placeholder="Enter password"
                    required
                >

            </div>

            <button type="submit">

                Submit

            </button>

        </form>

    </div>

</body>

</html>
